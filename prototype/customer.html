<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송오더 - 고객 화면</title>
<style>
:root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:#1e2a4a;--bg-header:#0f1629;--bg-input:#253255;--border:#2a3a5c;--accent:#e94560;--text-primary:#eee;--text-secondary:#aab;--text-muted:#778;--text-dim:#556;--btn-secondary:#253255;--btn-secondary-text:#aab}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;height:100vh}

header{display:flex;align-items:center;justify-content:space-between;background:var(--bg-header);padding:0 16px;height:56px;border-bottom:1px solid var(--border)}
header .logo{color:var(--accent);font-size:22px;font-weight:bold}
.table-badge{background:var(--accent);color:#fff;border-radius:8px;padding:4px 12px;text-align:center}
.table-badge .lbl{font-size:10px;line-height:1}
.table-badge .num{font-size:24px;font-weight:bold;line-height:1.2}

.body-wrap{display:flex;height:calc(100vh - 56px - 60px);overflow:hidden}
.sidebar{width:120px;flex-shrink:0;background:var(--bg-primary);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
.sidebar button{width:100%;padding:14px 8px;border:none;cursor:pointer;font-size:15px;font-weight:bold;background:transparent;color:var(--text-secondary);border-left:4px solid transparent;transition:all .15s}
.sidebar button.active{background:var(--accent);color:#fff;border-left-color:var(--accent)}
.main{flex:1;overflow-y:auto;padding:20px;background:var(--bg-secondary)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

.card{background:var(--bg-card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.card-img{position:relative;width:100%;padding-top:75%;background:var(--bg-input);cursor:pointer}
.card-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.card-img .dim{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:12px;opacity:0;transition:opacity .25s;pointer-events:none}
.card-img .dim.show{opacity:1}
.card-img .dim p{color:#fff;font-size:14px;line-height:1.6;text-align:center;word-break:keep-all}
.card-img .soldout{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
.card-img .soldout span{color:var(--accent);font-size:24px;font-weight:bold;border:3px solid var(--accent);padding:4px 16px;border-radius:4px;transform:rotate(-15deg)}
.card-bottom{padding:10px 12px 14px;display:flex;align-items:center;justify-content:space-between}
.card-bottom .info{flex:1;min-width:0}
.card-bottom .name{font-size:16px;font-weight:bold;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-bottom .price{font-size:18px;font-weight:bold}
.cart-btn{position:relative;width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.cart-btn:active{transform:scale(.9)}
.cart-btn .badge{position:absolute;top:-4px;right:-4px;background:#e74c3c;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}

nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg-header);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100}
nav a{color:var(--text-muted);text-decoration:none;font-size:14px;padding:10px 16px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
nav a.active{color:var(--text-primary);font-weight:bold}
nav a .icon{font-size:20px}
nav .nav-badge{position:absolute;top:4px;right:4px;background:var(--accent);color:#fff;border-radius:50%;min-width:18px;height:18px;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:bold;padding:0 4px}

/* Pages */
.page{display:none}
.page.active{display:block}

/* Cart page */
.cart-empty{display:flex;align-items:center;justify-content:center;height:calc(100vh - 56px - 60px);background:var(--bg-secondary)}
.cart-list{background:var(--bg-card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.qty-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-primary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Order page */
.order-card{background:var(--bg-card);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.status-badge{padding:4px 12px;border-radius:20px;color:#fff;font-size:13px;font-weight:bold}

/* Parking page */
.parking-wrap{display:flex;align-items:center;justify-content:center;height:calc(100vh - 56px - 60px);background:var(--bg-secondary)}
.parking-card{background:var(--bg-card);border-radius:16px;padding:32px;width:400px;max-width:90%;border:1px solid var(--border)}
.parking-input{width:100%;padding:14px;font-size:18px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);text-align:center;margin-bottom:12px}
.parking-btn{width:100%;padding:16px;font-size:18px;font-weight:bold;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer}
.msg-ok{background:#1b5e20;color:#a5d6a7;padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:14px}
</style>
</head>
<body>

<header>
  <span class="logo">송오더</span>
  <div class="table-badge"><div class="lbl">테이블번호</div><div class="num">5</div></div>
</header>

<!-- 메뉴 페이지 -->
<div id="pageMenu" class="page active">
  <div class="body-wrap">
    <aside class="sidebar" id="catSidebar"></aside>
    <main class="main">
      <h2 style="margin:0 0 16px;font-size:22px" id="catTitle"></h2>
      <div class="grid" id="menuGrid"></div>
    </main>
  </div>
</div>

<!-- 장바구니 페이지 -->
<div id="pageCart" class="page">
  <div id="cartContent" style="background:var(--bg-secondary);min-height:calc(100vh - 56px - 60px);padding:20px"></div>
</div>

<!-- 주문내역 페이지 -->
<div id="pageOrders" class="page">
  <div id="ordersContent" style="background:var(--bg-secondary);min-height:calc(100vh - 56px - 60px);padding:20px"></div>
</div>

<!-- 주차등록 페이지 -->
<div id="pageParking" class="page">
  <div class="parking-wrap">
    <div class="parking-card">
      <h2 style="text-align:center;margin:0 0 8px">🅿️ 무료 주차 등록</h2>
      <p style="color:var(--text-muted);text-align:center;margin:0 0 24px;font-size:14px">완료된 주문이 있어야 등록 가능합니다</p>
      <div id="parkingMsg"></div>
      <input class="parking-input" placeholder="차량 번호 (예: 12가3456)" id="plateInput">
      <button class="parking-btn" onclick="registerParking()">등록하기</button>
    </div>
  </div>
</div>

<nav>
  <a href="#" class="active" onclick="showPage('Menu',this)"><span class="icon">🍽️</span>메뉴</a>
  <a href="#" onclick="showPage('Orders',this)"><span class="icon">📋</span>주문내역</a>
  <a href="#" onclick="showPage('Parking',this)"><span class="icon">🅿️</span>주차등록</a>
  <a href="#" onclick="showPage('Cart',this)"><span class="icon">🛒</span>장바구니<span class="nav-badge" id="cartBadge"></span></a>
</nav>

<script>
const categories=[
  {id:'c1',name:'추천메뉴'},{id:'c2',name:'메인요리'},{id:'c3',name:'사이드'},{id:'c4',name:'음료'}
];
const menus=[
  {id:'m1',name:'숯불갈비',price:28000,description:'국내산 한우 갈비를 참숯에 구워 깊은 풍미를 살린 시그니처 메뉴입니다.',image_url:'https://images.unsplash.com/photo-1544025162-d76694265947?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c1'},
  {id:'m2',name:'해물파전',price:18000,description:'신선한 해물과 쪽파를 넣어 바삭하게 부친 전통 파전입니다.',image_url:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c1'},
  {id:'m3',name:'된장찌개',price:12000,description:'직접 담근 된장으로 끓인 구수한 찌개. 두부와 야채가 듬뿍 들어갑니다.',image_url:'https://images.unsplash.com/photo-1547592180-85f173990554?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c2'},
  {id:'m4',name:'김치볶음밥',price:11000,description:'묵은지와 삼겹살을 넣어 불맛 가득한 볶음밥입니다.',image_url:'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c2'},
  {id:'m5',name:'잡채',price:15000,description:'당면과 각종 채소를 참기름에 볶아낸 잡채입니다.',image_url:'https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=400&h=300&fit=crop',is_sold_out:true,category_id:'c2'},
  {id:'m6',name:'계란말이',price:9000,description:null,image_url:'https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c3'},
  {id:'m7',name:'콜라',price:3000,description:'시원한 코카콜라 500ml',image_url:'https://images.unsplash.com/photo-1554866585-cd94860890b7?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c4'},
  {id:'m8',name:'생맥주',price:5000,description:'시원한 생맥주 500ml. 갓 따른 신선함을 즐기세요.',image_url:'https://images.unsplash.com/photo-1535958636474-b021ee887b13?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c4'},
  {id:'m9',name:'소주',price:5000,description:'참이슬 오리지널 360ml',image_url:'https://images.unsplash.com/photo-1569529465841-dfecdab7503b?w=400&h=300&fit=crop',is_sold_out:false,category_id:'c4'},
];

let cart={};
let selectedCat=null;
let activeDescId=null;
const orders=[
  {id:'o1',order_number:1,status:'COMPLETED',total_amount:46000,created_at:'2026-03-20T14:30:00',items:[{id:'i1',menu_name:'숯불갈비',quantity:1,unit_price:28000,subtotal:28000},{id:'i2',menu_name:'해물파전',quantity:1,unit_price:18000,subtotal:18000}]},
  {id:'o2',order_number:2,status:'PREPARING',total_amount:17000,created_at:'2026-03-20T14:45:00',items:[{id:'i3',menu_name:'된장찌개',quantity:1,unit_price:12000,subtotal:12000},{id:'i4',menu_name:'소주',quantity:1,unit_price:5000,subtotal:5000}]},
];

function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+name).classList.add('active');
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
  if(el)el.classList.add('active');
  if(name==='Cart')renderCart();
  if(name==='Orders')renderOrders();
  event.preventDefault();
}

function selectCat(id){selectedCat=id;renderMenu();}

function renderMenu(){
  // sidebar
  const sb=document.getElementById('catSidebar');
  sb.innerHTML=`<button class="${!selectedCat?'active':''}" onclick="selectCat(null)">전체</button>`+
    categories.map(c=>`<button class="${selectedCat===c.id?'active':''}" onclick="selectCat('${c.id}')">${c.name}</button>`).join('');

  const filtered=(selectedCat?menus.filter(m=>m.category_id===selectedCat):menus).filter(m=>m.image_url);
  const catName=selectedCat?categories.find(c=>c.id===selectedCat)?.name:'전체메뉴';
  document.getElementById('catTitle').innerHTML=`${catName} <span style="color:var(--text-muted);font-size:14px">${filtered.length}개</span>`;

  document.getElementById('menuGrid').innerHTML=filtered.map(m=>{
    const qty=cart[m.id]||0;
    const isActive=activeDescId===m.id;
    return`<div class="card">
      <div class="card-img" onclick="toggleDesc('${m.id}')">
        <img src="${m.image_url}" alt="${m.name}">
        ${m.is_sold_out?'<div class="soldout"><span>SOLD OUT</span></div>':''}
        <div class="dim ${isActive?'show':''}"><p>${m.description||'설명이 없습니다.'}</p></div>
      </div>
      <div class="card-bottom">
        <div class="info"><div class="name">${m.name}</div><div class="price">${m.price.toLocaleString()}원</div></div>
        ${!m.is_sold_out?`<button class="cart-btn" onclick="addToCart('${m.id}',event)">🛒${qty>0?`<span class="badge">${qty}</span>`:''}</button>`:''}
      </div>
    </div>`;
  }).join('')||'<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px">메뉴가 없습니다.</p>';

  updateCartBadge();
}

function toggleDesc(id){activeDescId=activeDescId===id?null:id;renderMenu();}

function addToCart(id,e){
  e.stopPropagation();
  cart[id]=(cart[id]||0)+1;
  renderMenu();
}

function updateCartBadge(){
  const total=Object.values(cart).reduce((s,v)=>s+v,0);
  const b=document.getElementById('cartBadge');
  if(total>0){b.style.display='flex';b.textContent=total;}else{b.style.display='none';}
}

function renderCart(){
  const items=Object.entries(cart).filter(([,q])=>q>0).map(([id,qty])=>{const m=menus.find(x=>x.id===id);return{...m,qty,subtotal:m.price*qty};});
  const el=document.getElementById('cartContent');
  if(items.length===0){
    el.innerHTML='<div class="cart-empty"><div style="text-align:center;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:12px">🛒</div><p style="font-size:18px">장바구니가 비어있습니다.</p></div></div>';
    return;
  }
  const total=items.reduce((s,i)=>s+i.subtotal,0);
  el.innerHTML=`<h2 style="margin:0 0 16px">장바구니</h2>
    <div class="cart-list">${items.map(i=>`<div class="cart-item">
      <div style="flex:1"><div style="font-size:16px;font-weight:bold">${i.name}</div><div style="color:var(--text-muted);font-size:14px;margin-top:2px">${i.price.toLocaleString()}원</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="qty-btn" onclick="updateQty('${i.id}',-1)">−</button>
        <span style="font-size:18px;min-width:30px;text-align:center">${i.qty}</span>
        <button class="qty-btn" onclick="updateQty('${i.id}',1)">+</button>
        <span style="font-size:16px;font-weight:bold;min-width:80px;text-align:right">${i.subtotal.toLocaleString()}원</span>
        <button onclick="removeFromCart('${i.id}')" style="width:36px;height:36px;border-radius:50%;border:none;background:var(--btn-secondary);color:var(--accent);font-size:16px;cursor:pointer">✕</button>
      </div>
    </div>`).join('')}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px">
      <button onclick="clearCart()" style="padding:12px 24px;background:var(--btn-secondary);color:var(--btn-secondary-text);border:none;border-radius:8px;font-size:16px;cursor:pointer">전체삭제</button>
      <div style="font-size:22px;font-weight:bold">합계 ${total.toLocaleString()}원</div>
    </div>
    <button onclick="placeOrder()" style="width:100%;margin-top:16px;padding:18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:20px;font-weight:bold;cursor:pointer">주문하기 (${items.length}건)</button>`;
}

function updateQty(id,d){cart[id]=Math.max(0,(cart[id]||0)+d);if(cart[id]<=0)delete cart[id];renderCart();updateCartBadge();}
function removeFromCart(id){delete cart[id];renderCart();updateCartBadge();}
function clearCart(){cart={};renderCart();updateCartBadge();}
function placeOrder(){
  const items=Object.entries(cart).filter(([,q])=>q>0);
  if(!items.length)return;
  const total=items.reduce((s,[id,q])=>s+menus.find(m=>m.id===id).price*q,0);
  const num=orders.length+1;
  orders.push({id:'o'+num,order_number:num,status:'PENDING',total_amount:total,created_at:new Date().toISOString(),
    items:items.map(([id,q],i)=>{const m=menus.find(x=>x.id===id);return{id:'ni'+i,menu_name:m.name,quantity:q,unit_price:m.price,subtotal:m.price*q};})});
  cart={};
  alert('주문이 완료되었습니다! 주문번호: #'+num);
  showPage('Orders',document.querySelectorAll('nav a')[1]);
  updateCartBadge();
}

function renderOrders(){
  const el=document.getElementById('ordersContent');
  const statusCfg={PENDING:{label:'대기중',bg:'#757575'},PREPARING:{label:'준비중',bg:'#FF9800'},COMPLETED:{label:'완료',bg:'#4CAF50'}};
  if(!orders.length){el.innerHTML='<div class="cart-empty"><div style="text-align:center;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:12px">📋</div><p style="font-size:18px">주문 내역이 없습니다.</p></div></div>';return;}
  el.innerHTML=`<h2 style="margin:0 0 16px">주문 내역</h2>`+orders.slice().reverse().map(o=>{
    const sc=statusCfg[o.status];
    return`<div class="order-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:16px;font-weight:bold">주문 #${o.order_number}</span>
        <span class="status-badge" style="background:${sc.bg}">${sc.label}</span>
      </div>
      <div style="color:var(--text-dim);font-size:13px;margin-bottom:10px">${new Date(o.created_at).toLocaleString()}</div>
      ${o.items.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--text-secondary);font-size:14px"><span>${i.menu_name} × ${i.quantity}</span><span>${i.subtotal.toLocaleString()}원</span></div>`).join('')}
      <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;text-align:right;font-size:18px;font-weight:bold">${o.total_amount.toLocaleString()}원</div>
    </div>`;
  }).join('');
}

function registerParking(){
  const v=document.getElementById('plateInput').value.trim();
  if(!v){alert('차량 번호를 입력해주세요.');return;}
  document.getElementById('parkingMsg').innerHTML='<div class="msg-ok">✅ 차량 등록이 완료되었습니다. ('+v+')</div>';
}

renderMenu();
</script>
</body>
</html>
